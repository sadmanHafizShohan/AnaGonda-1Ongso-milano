<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জমির হিসাব (কপি সুবিধা সহ)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 15px;
        }
        .owner-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            transition: 0.3s;
        }
        .owner-row:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-color: #bdc3c7;
        }
        .owner-label {
            font-weight: bold;
            color: #2c3e50;
            width: 80px;
            font-size: 16px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            width: 135px;
        }
        .input-group span {
            font-size: 13px;
            color: #555;
            margin-bottom: 5px;
            font-weight: 600;
        }
        select {
            padding: 8px 5px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            width: 100%;
            background-color: white;
            font-size: 15px;
            cursor: pointer;
            outline: none;
        }
        select:focus {
            border-color: #3498db;
        }
        .button-group {
            display: flex;
            gap: 5px;
            margin-top: 20px;
        }
        .btn-copy {
            background-color: #f39c12;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }
        .btn-copy:hover {
            background-color: #e67e22;
        }
        .btn-remove {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-remove:hover {
            background-color: #c0392b;
        }
        .btn-add {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            border-radius: 5px;
            cursor: pointer;
            display: block;
            margin: 0 auto 20px auto;
        }
        .btn-add:hover {
            background-color: #2980b9;
        }
        .action-buttons {
            text-align: center;
            margin-top: 25px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .btn-calc {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 17px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-calc:hover {
            background-color: #219150;
        }
        .btn-reset {
            background-color: #95a5a6;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 17px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }
        .btn-reset:hover {
            background-color: #7f8c8d;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .details {
            font-size: 16px;
            color: #444;
            margin-top: 10px;
            font-weight: normal;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>খতিয়ানের জমির অংশ হিসাব</h2>
    <p class="subtitle">একাধিক মালিকের অংশ সমান হলে "কপি" বাটনে ক্লিক করে সহজেই নতুন সারি তৈরি করতে পারবেন।</p>

    <div id="owners-container">
        <!-- Rows will be generated here -->
    </div>

    <button class="btn-add" onclick="addOwner()">+ নতুন মালিক যোগ করুন</button>

    <div class="action-buttons">
        <button class="btn-calc" onclick="calculateTotal()">ফলাফল হিসাব করুন</button>
        <button class="btn-reset" onclick="resetAll()">রিসেট</button>
    </div>

    <div id="result" class="result-box">
        <div id="result-text"></div>
        <div id="result-details" class="details"></div>
    </div>
</div>

<script>
    // ইংরেজি সংখ্যাকে বাংলায় রূপান্তরের ফাংশন
    function enToBn(num) {
        const banglaDigits = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
        return num.toString().split('').map(digit => banglaDigits[digit] || digit).join('');
    }

    // সঠিক চিহ্নগুলো
    const anaSymbols = [
        "০ = ০ আনা", "⁄ = ১ আনা", "৵ = ২ আনা", "৶ = ৩ আনা", "৷ = ৪ আনা",
        "৷⁄ = ৫ আনা", "৷৵ = ৬ আনা", "৷৶ = ৭ আনা", "৷৷ = ৮ আনা", "৷৷⁄ = ৯ আনা",
        "৷৷৵ = ১০ আনা", "৷৷৶ = ১১ আনা", "৸ = ১২ আনা", "৸⁄ = ۱۳ আনা", "৸৵ = ১৪ আনা",
        "৸৶ = ১৫ আনা", "১৬ = ১৬ আনা"
    ];
    
    const koraSymbols = ["০ = ০ কড়া", "৷ = ১ কড়া", "৷৷ = ২ কড়া", "৸ = ৩ কড়া"];
    const krantiSymbols = ["০ = ০ ক্রান্তি", "৴ = ১ ক্রান্তি", "৴৴ = ২ ক্রান্তি"];

    function buildOptions(array) {
        return array.map((text, index) => `<option value="${index}">${text}</option>`).join('');
    }

    function buildGondaOptions() {
        let opts = '';
        for(let i = 0; i <= 19; i++) opts += `<option value="${i}">${enToBn(i)} = ${enToBn(i)} গণ্ডা</option>`;
        return opts;
    }

    function buildTilOptions() {
        let opts = '';
        for(let i = 0; i <= 19; i++) opts += `<option value="${i}">${enToBn(i)} = ${enToBn(i)} তিল</option>`;
        return opts;
    }

    const container = document.getElementById('owners-container');

    // নতুন মালিক যোগ করার ফাংশন (আগের ভ্যালু দিয়েও তৈরি করা যাবে)
    function addOwner(vAna = 0, vGonda = 0, vKora = 0, vKranti = 0, vTil = 0) {
        const div = document.createElement('div');
        div.className = 'owner-row';
        
        div.innerHTML = `
            <div class="owner-label">মালিক</div>
            <div class="input-group">
                <span>আনা (Ana)</span>
                <select class="ana">${buildOptions(anaSymbols)}</select>
            </div>
            <div class="input-group">
                <span>গণ্ডা (Gonda)</span>
                <select class="gonda">${buildGondaOptions()}</select>
            </div>
            <div class="input-group">
                <span>কড়া (Kora)</span>
                <select class="kora">${buildOptions(koraSymbols)}</select>
            </div>
            <div class="input-group">
                <span>ক্রান্তি (Kranti)</span>
                <select class="kranti">${buildOptions(krantiSymbols)}</select>
            </div>
            <div class="input-group">
                <span>তিল (Til)</span>
                <select class="til">${buildTilOptions()}</select>
            </div>
            <div class="button-group">
                <button class="btn-copy" title="হুবহু একই অংশ কপি করুন" onclick="copyOwner(this)">কপি</button>
                <button class="btn-remove" title="এই মালিককে মুছে ফেলুন" onclick="removeOwner(this)">মুছুন</button>
            </div>
        `;
        
        container.appendChild(div);

        // যদি কপি করা ভ্যালু থাকে, তবে সেগুলো সেট করে দেওয়া
        div.querySelector('.ana').value = vAna;
        div.querySelector('.gonda').value = vGonda;
        div.querySelector('.kora').value = vKora;
        div.querySelector('.kranti').value = vKranti;
        div.querySelector('.til').value = vTil;

        updateLabels();
    }

    // বর্তমান মালিকের অংশ কপি করার ফাংশন
    function copyOwner(btn) {
        const row = btn.closest('.owner-row');
        const ana = row.querySelector('.ana').value;
        const gonda = row.querySelector('.gonda').value;
        const kora = row.querySelector('.kora').value;
        const kranti = row.querySelector('.kranti').value;
        const til = row.querySelector('.til').value;

        // একই ভ্যালু দিয়ে নতুন সারি তৈরি
        addOwner(ana, gonda, kora, kranti, til);
    }

    function removeOwner(btn) {
        const rows = document.querySelectorAll('.owner-row');
        if (rows.length > 1) {
            btn.closest('.owner-row').remove();
            updateLabels();
        } else {
            alert('কমপক্ষে ১ জন মালিক থাকতে হবে!');
        }
    }

    function updateLabels() {
        const labels = document.querySelectorAll('.owner-label');
        labels.forEach((label, index) => {
            label.innerText = `মালিক ${enToBn(index + 1)}:`;
        });
    }

    function calculateTotal() {
        let totalTil = 0;
        const rows = document.querySelectorAll('.owner-row');

        rows.forEach(row => {
            let ana = parseInt(row.querySelector('.ana').value);
            let gonda = parseInt(row.querySelector('.gonda').value);
            let kora = parseInt(row.querySelector('.kora').value);
            let kranti = parseInt(row.querySelector('.kranti').value);
            let til = parseInt(row.querySelector('.til').value);

            totalTil += (ana * 4800) + (gonda * 240) + (kora * 60) + (kranti * 20) + til;
        });

        const FULL_PROPERTY_TIL = 76800; // ১৬ আনা = ৭৬৮০০ তিল

        let remainingTil = totalTil;
        let sumAna = Math.floor(remainingTil / 4800);
        remainingTil %= 4800;
        let sumGonda = Math.floor(remainingTil / 240);
        remainingTil %= 240;
        let sumKora = Math.floor(remainingTil / 60);
        remainingTil %= 60;
        let sumKranti = Math.floor(remainingTil / 20);
        let sumFinalTil = remainingTil % 20;

        const resultBox = document.getElementById('result');
        const resultText = document.getElementById('result-text');
        const resultDetails = document.getElementById('result-details');
        
        resultBox.style.display = 'block';
        resultBox.className = 'result-box'; 

        let detailsString = `সব মালিকের মোট যোগফল: <b>${enToBn(sumAna)}</b> আনা, <b>${enToBn(sumGonda)}</b> গণ্ডা, <b>${enToBn(sumKora)}</b> কড়া, <b>${enToBn(sumKranti)}</b> ক্রান্তি, <b>${enToBn(sumFinalTil)}</b> তিল।`;

        if (totalTil === FULL_PROPERTY_TIL) {
            resultBox.classList.add('success');
            resultText.innerHTML = "✅ চমৎকার! সকল মালিকের মোট জমি ঠিক ১ অংশ (১৬ আনা) মিলেছে।";
            resultDetails.innerHTML = detailsString;
        } else if (totalTil > FULL_PROPERTY_TIL) {
            resultBox.classList.add('error');
            resultText.innerHTML = "❌ ভুল! যোগফল ১ অংশের (১৬ আনা) চেয়ে বেশি হয়ে গেছে।";
            resultDetails.innerHTML = detailsString;
        } else {
            resultBox.classList.add('error');
            resultText.innerHTML = "❌ ভুল! যোগফল ১ অংশের (১৬ আনা) চেয়ে কম আছে।";
            resultDetails.innerHTML = detailsString;
        }
    }

    function resetAll() {
        const selects = document.querySelectorAll('select');
        selects.forEach(select => select.value = 0);
        document.getElementById('result').style.display = 'none';
    }

    // পেজ লোড হলে ডিফল্টভাবে ১ জন মালিক তৈরি করা (কপি করা সহজ হবে)
    window.onload = () => {
        addOwner();
    };

</script>

</body>
</html>
